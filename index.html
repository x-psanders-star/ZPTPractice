<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Form</title>
    <style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        background-color: #000000; /* Black Background */
        font-family: sans-serif;
        padding: 20px;
        color: white; /* Makes text readable against dark backgrounds */
    }

    form {
        background: #2d2d2d; /* Dark Grey Form */
        padding: 2rem;
        border-radius: 12px; /* Rounded corners for the form */
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        width: 100%;
        max-width: 500px; /* Wider form */
    }

    /* Target all input types for rounded corners and full width */
    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        box-sizing: border-box;
        border: 1px solid #444;
        border-radius: 8px; /* Rounded corners for inputs */
        background-color: #3d3d3d; /* Slightly lighter grey for inputs */
        color: white;
        text-align: left;
    }

    textarea {
        resize: vertical;
        min-height: 100px;
    }

    .input-group {
        margin-bottom: 1.2rem;
    }

    .row {
        display: flex;
        gap: 15px;
        margin-bottom: 1rem;
    }

    .row .input-group {
        flex: 1;
        margin-bottom: 0;
    }

    @media (max-width: 480px) {
        .row {
            flex-direction: column;
        }
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        font-size: 0.9rem;
    }

    button {
        width: 100%;
        padding: 12px;
        cursor: pointer;
        margin-top: 15px;
        background-color: #1a73e8; /* Blue button for contrast */
        color: white;
        border: none;
        border-radius: 8px; /* Rounded corners for button */
        font-weight: bold;
    }
    
    button:hover {
        background-color: #1557b0;
    }
    .form-row {
      display: flex;
      gap: 20px; /* Adjusts the space between the two inputs */
      margin-bottom: 15px;
    }

    .form-group {
      flex: 1; /* Ensures both inputs take up equal width */
      display: flex;
      flex-direction: column;
    }
</style>
</head>
<body>

    <form id="zptForm">
        <h2>Create ZPT Ticket</h2>
        <div class="input-group">
            <label for="reason">Problem</label>
            <select id="problem" name="reason">
                <option value="problem">Problem</option>
            </select>
        </div>

        <div class="input-group">
            <label for="summary">Summary</label>
            <input type="text" id="summary" required>
        </div>
        <div class="input-group">
            <label for="severity">Severity</label>
            <select id="severity" name="severity">
                <option value="SO">SO</option>
                <option value="S1">S1</option>
                <option value="S2">S2</option>
            </select>
        </div>
        <div class="input-group">
            <label for="message">Details</label>
            <textarea id="message" name="message" rows="10" >Who detected this issue?
>
How/Where was the issue observed
>
What is the issue observed?
>
Why is this an issue?
>
Impact to operations/test activity
></textarea>
        </div>
        <div class="input-group">
            <label for="location">Location</label>
            <select id="location" name="location">
                <option value="Las Vegas">Las Vegas</option>
                <option value="San Fransisco">San Fransisco</option>
                <option value="Austin">Austin</option>
                <option value="Miami">Miami</option>
            </select>
        </div>
        <div class="row">
            <div class="input-group">
                <label for="category">Found During</label>
                <select id="category" onchange="updateItems()">
                    <option value="">Pick an option</option>
                    <option value="testing">Testing</option>
                    <option value="rider service">Rider Service</option>
            </select>
        </div>

        <div class="input-group">
            <label for="items">Items</label>
            <select id="items">
                <option value="">Pick an option</option>
            </select>
    </div>
</div>
</div> 
    </div> <div class="row">
        <div class="input-group">
            <label for="vehicle selector">Vehicle Selector</label>
            <select id="vehicle selector" name="vehicle selector">
                <option value="B4">VH6.B4</option>
                <option value="B3">VH6.B3</option>
                <option value="B2">VH6.B2</option>
                <option value="B1">VH6.B1</option>
            </select>
        </div>
        <div class="input-group">
            <label for="vehiclenum">Vehicle Number</label>
            <input type="text" id="vehiclenum" placeholder="Input vehicle number" required>
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label for="start-date">Select A Date</label>
            <input type="date" id="start-date" name="start-date" required>
        </div>
        <div class="input-group">
            <label for="time">Time</label>
            <input type="text" id="time" placeholder="Input time" required>
        </div>
    </div>
 <div class="input-group">
        <label for="mission phase">Mission Phase</label>
        <select id="mission phase" name="mission phase">
            <option value="charging">Charging</option>
            <option value="checklist">Checklist</option>
            <option value="dropoff">Drop Off</option>
            <option value="hailing">Hailing</option>
            <option value="ingest">Ingest</option>
            <option value="onmissionrider">On Mission - Rider</option>
            <option value="onmissionnorider">On Mission - No Rider</option>
            <option value="otherbreak">Other/Break</option>
            <option value="pickup">Pick-Up</option>
            <option value="shutdown">Shut Down</option>
        </select>
    </div>
    <div class="input-group">
        <label for="affectsversions">Affects Version/s</label>
        <input type="text" id="version" placeholder="Software version" required>
    </div>
     <div class="input-group">
        <label for="workaround">Workaround Applied</label>
        <select id="workaround" name="workaroundapplied" onchange="toggleApprovedDropdown()">
            <option value="engineeringworkaround">Engineering Workaround</option>
            <option value="vehiclepowercycle">Vehicle Power Cycle</option>
            <option value="undocumented">Undocumented Workaround</option>
            <option value="zcore">Restart ZCore</option>
            <option value="approved">Approved Workaround</option>
            <option value="acknowledge">Acknowledge or Ignore</option>
        </select>
    </div>        
    <div id="approved-extra-group" class="input-group" style="display: none;">
        <label for="workaroundid">Workaround ID</label>
        <input type="text" id="workaroundid" placeholder="input workaround id">
    </div>
    <div class="input-group">
            <label for="message">Workaround Details</label>
            <textarea id="workarounddetails" name="message" rows="10" ></textarea>
    </div>
      <div class="input-group">
            <label for="powercyclenumber">Number of Power Cycles</label>
            <input type="text" id="powercyclenumber" required>
        </div>
        <button type="submit">Submit</button>
        <div id="results-display" style="margin-top: 20px; padding: 15px; border-top: 2px solid #eee; display: none;">
            <h3>Submission Summary</h3>
            <div id="results-content"></div>
        </div>
</form>
<script>
    
function toggleApprovedDropdown() {
    const workaroundSelect = document.getElementById('workaround');
    const extraGroup = document.getElementById('approved-extra-group');
    const workaroundInput = document.getElementById('workaroundid');
    
    if (workaroundSelect.value === 'approved') {
        extraGroup.style.display = 'block';
        workaroundInput.setAttribute('required', ''); // Add required only when visible
    } else {
        extraGroup.style.display = 'none';
        workaroundInput.removeAttribute('required'); // Remove it when hidden
        workaroundInput.value = ""; 
    }
}
    function updateItems() {
        const category = document.getElementById("category").value;
        const itemSelect = document.getElementById("items");

        // Object containing the options for each category
        const options = {
            "testing": ["Training","EX testing","SIV PRC Testing","SIV Pre-PRC","Stability Testing","SW Development","SW Intergration Acceptance"],
            "rider service": ["VH6 ZIP (Zoox Internal Pilot)","VH6 Service"]
        };

        // Clear the second dropdown
        itemSelect.innerHTML = '<option value="">Select Item</option>';

        // If a valid category is selected, add its items
        if (category && options[category]) {
            options[category].forEach(item => {
                const newOption = document.createElement("option");
                newOption.value = item;
                newOption.textContent = item;
                itemSelect.appendChild(newOption);
            });
        }
    }
    document.getElementById('zptForm').addEventListener('submit', function(e) {
    e.preventDefault();

// 1. Gather the data
    const formData = {
        "Problem Type": document.getElementById('problem').value,
        "Summary": document.getElementById('summary').value,
        "Severity": document.getElementById('severity').value,
        "Details": document.getElementById('message').value, // Added this
        "Location": document.getElementById('location').value,
        "Vehicle Type": document.getElementById('vehicle selector').value,
        "Vehicle #": document.getElementById('vehiclenum').value,
        "Date/Time": `${document.getElementById('start-date').value} at ${document.getElementById('time').value}`,
        "Workaround": document.getElementById('workaround').value,
        "Workaround ID": document.getElementById('workaroundid').value || "None",
        "Workaround Details": document.getElementById('workarounddetails').value // Added this
    };

   // 2. Format the output
    let output = "";
    for (const [key, value] of Object.entries(formData)) {
        // Use <pre> tags for Details to preserve line breaks, otherwise use <p>
        if (key === "Details" || key === "Workaround Details") {
            output += `<p><strong>${key}:</strong></p><pre style="white-space: pre-wrap; font-family: inherit; background: #3d3d3d; padding: 10px; border-radius: 4px;">${value}</pre>`;
        } else {
            output += `<p><strong>${key}:</strong></p><pre style="white-space: pre-wrap; overflow-wrap: break-word; font-family: inherit; background: #3d3d3d; padding: 10px; border-radius: 4px;">${value}</pre>`;
        }
    }

    // 3. Show the results container and inject the text
    const resultsDiv = document.getElementById('results-display');
    const contentDiv = document.getElementById('results-content');
    
    contentDiv.innerHTML = output;
    resultsDiv.style.display = 'block';

    // Optional: Smooth scroll to results
    resultsDiv.scrollIntoView({ behavior: 'smooth' });
});
</script>
</body>
</html>
